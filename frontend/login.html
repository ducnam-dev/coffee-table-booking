<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Pam Coffee & Tea</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="flex min-h-screen bg-stone-50 text-stone-800 antialiased selection:bg-amber-600 selection:text-white justify-center items-center p-4">

  <div class="w-full max-w-md space-y-8">
    <!-- Header Logo / Back Home link -->
    <div class="flex flex-col items-center text-center space-y-3">
      <a href="./index.html" class="flex items-center gap-2 group">
        <img src="./assets/logo.png" alt="Pam Coffee & Tea" class="h-12 w-12 rounded-full object-cover shadow-md transition-transform duration-300 group-hover:scale-105" />
        <span class="text-2xl font-bold tracking-tight text-stone-900">
          Pam Coffee <span class="text-amber-600">& Tea</span>
        </span>
      </a>
      <h2 class="text-3xl font-extrabold text-stone-900 tracking-tight">Chào Mừng Trở Lại</h2>
      <p class="text-sm text-stone-500">Đăng nhập tài khoản của bạn để đặt trước chỗ ngồi ưng ý.</p>
    </div>

    <!-- Login Card -->
    <div class="rounded-3xl border border-stone-200 bg-white p-8 shadow-xl">
      <form id="login-form" class="space-y-5">
        <div>
          <label for="username" class="block text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">Tên đăng nhập hoặc Email</label>
          <input type="text" id="username" required placeholder="ten_dang_nhap hoặc email@gmail.com" class="w-full rounded-xl border border-stone-200 bg-stone-50/50 px-4 py-3 text-sm font-semibold text-stone-800 outline-none ring-amber-600/20 focus:border-amber-600 focus:bg-white focus:ring-4 transition-all duration-200" />
        </div>

        <div>
          <label for="password" class="block text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">Mật khẩu</label>
          <input type="password" id="password" required placeholder="••••••••" class="w-full rounded-xl border border-stone-200 bg-stone-50/50 px-4 py-3 text-sm font-semibold text-stone-800 outline-none ring-amber-600/20 focus:border-amber-600 focus:bg-white focus:ring-4 transition-all duration-200" />
        </div>

        <div id="error-message" class="hidden rounded-xl bg-rose-50 border border-rose-100 p-3.5 text-xs font-medium text-rose-600">
          Tên đăng nhập hoặc mật khẩu không chính xác!
        </div>

        <button type="submit" class="w-full rounded-xl bg-amber-600 py-3.5 text-center text-sm font-bold text-white shadow-lg shadow-amber-600/15 hover:bg-amber-700 hover:shadow-amber-600/30 transition-all active:scale-98 duration-200">
          Đăng Nhập Ngay
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-8 flex items-center justify-center">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-stone-200"></div>
        </div>
        <span class="relative bg-white px-3 text-xs font-bold uppercase tracking-widest text-stone-400">Tester / Developer</span>
      </div>

      <!-- Quick logins (Roles simulation) -->
      <div class="grid grid-cols-2 gap-3">
        <button onclick="handleQuickLogin('customer')" class="flex flex-col items-center justify-center rounded-2xl border border-stone-200 bg-stone-50/50 p-3.5 hover:bg-amber-50 hover:border-amber-200 transition-all duration-200 text-left">
          <span class="text-xs font-bold text-stone-700">Vào vai</span>
          <span class="text-sm font-bold text-amber-700 mt-1">Khách Hàng</span>
        </button>
        <button onclick="handleQuickLogin('admin')" class="flex flex-col items-center justify-center rounded-2xl border border-stone-200 bg-stone-50/50 p-3.5 hover:bg-amber-50 hover:border-amber-200 transition-all duration-200 text-left">
          <span class="text-xs font-bold text-stone-700">Vào vai</span>
          <span class="text-sm font-bold text-amber-700 mt-1">Quản Trị Viên</span>
        </button>
      </div>

      <!-- Back / Register links -->
      <div class="mt-8 text-center text-sm">
        <span class="text-stone-500">Chưa có tài khoản?</span>
        <a id="register-link" href="./register.html" class="font-bold text-amber-600 hover:text-amber-700 ml-1 transition-colors">Đăng ký ngay</a>
      </div>
    </div>
  </div>

  <script src="./js/main.js"></script>
  <script>
    // Trích xuất tham số từ URL để xử lý redirect sau khi đăng nhập thành công
    const urlParams = new URLSearchParams(window.location.search);
    const redirectFrom = urlParams.get('from');
    const tableId = urlParams.get('tableId');

    // Cập nhật link đăng ký nếu có tham số redirect để bảo toàn đường dẫn
    const registerLink = document.getElementById('register-link');
    if (registerLink && redirectFrom) {
      let regUrl = `./register.html?from=${redirectFrom}`;
      if (tableId) regUrl += `&tableId=${tableId}`;
      registerLink.href = regUrl;
    }

    // Đăng nhập nhanh
    function handleQuickLogin(role) {
      const mockUser = role === 'admin' 
        ? { id: 1, username: 'admin', fullName: 'Quản Trị Pam', role: 'ADMIN', email: 'admin@pamcoffeetea.com' }
        : { id: 2, username: 'customer', fullName: 'Nguyễn Khách Hàng', role: 'CUSTOMER', email: 'khachhang@gmail.com' };
      
      const mockToken = role === 'admin' ? 'mock-admin-token-12345' : 'mock-customer-token-12345';
      
      localStorage.setItem('user', JSON.stringify(mockUser));
      localStorage.setItem('token', mockToken);
      
      doRedirect(mockUser);
    }

    // Thực hiện redirect
    function doRedirect(user) {
      if (redirectFrom) {
        let dest = `./${redirectFrom}`;
        if (tableId) dest += `?tableId=${tableId}`;
        window.location.href = dest;
      } else {
        if (user.role === 'ADMIN') {
          window.location.href = './admin.html';
        } else {
          window.location.href = './index.html';
        }
      }
    }

    // Form submit
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;
      const errorMessage = document.getElementById('error-message');

      if (!usernameInput || !passwordInput) {
        if (errorMessage) errorMessage.classList.remove('hidden');
        return;
      }

      // Thử gọi API backend signin
      try {
        const response = await fetch('http://localhost:8080/api/auth/signin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: usernameInput, password: passwordInput })
        });

        if (response.ok) {
          const data = await response.json();
          const roleStr = data.role.replace('ROLE_', ''); // CUSTOMER, ADMIN, v.v.
          const userObj = {
            id: data.id,
            username: data.username || data.email.split('@')[0],
            fullName: data.fullName || (roleStr === 'ADMIN' ? 'Quản Trị Pam' : 'Khách Hàng Pam'),
            email: data.email,
            role: roleStr
          };
          localStorage.setItem('user', JSON.stringify(userObj));
          localStorage.setItem('token', data.token);
          doRedirect(userObj);
          return;
        } else {
          // Lỗi thông tin đăng nhập
          if (errorMessage) {
            errorMessage.textContent = 'Email hoặc mật khẩu không chính xác!';
            errorMessage.classList.remove('hidden');
          }
          return;
        }
      } catch (err) {
        console.warn("Backend offline, chuyển sang chế độ đăng nhập nhanh.");
      }

      // Cho phép đăng nhập bất kỳ tài khoản nào để dễ test khi backend offline
      const isAdm = usernameInput.toLowerCase() === 'admin';
      handleQuickLogin(isAdm ? 'admin' : 'customer');
    });
  </script>
</body>
</html>
